<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 创作工具箱 - 智能创作平台</title>
    <style>
        /* ==================== CSS 变量 & 主题系统 ==================== */
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px var(--accent-glow);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 30px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 浅色主题 */
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-hover: rgba(99, 102, 241, 0.05);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 25px rgba(99, 102, 241, 0.2);
        }

        /* ==================== 全局重置 ==================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 
                         'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            transition: background var(--transition-normal), color var(--transition-normal);
        }

        /* 背景装饰层 */
        .bg-decoration {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: blobFloat 20s ease-in-out infinite alternate;
        }
        
        .bg-blob:nth-child(1) {
            width: 600px; height: 600px;
            background: var(--accent-primary);
            top: -15%; left: -10%;
            animation-delay: 0s;
        }
        .bg-blob:nth-child(2) {
            width: 500px; height: 500px;
            background: var(--accent-secondary);
            bottom: -10%; right: -8%;
            animation-delay: -7s;
        }
        .bg-blob:nth-child(3) {
            width: 400px; height: 400px;
            background: #06b6d4;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }
        
        @keyframes blobFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(60px, -40px) scale(1.1); }
            66%  { transform: translate(-30px, 50px) scale(0.95); }
            100% { transform: translate(-20px, 20px) scale(1.05); }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 32px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 14, 26, 0.7);
            transition: all var(--transition-normal);
        }
        
        [data-theme="light"] .navbar {
            background: rgba(248, 250, 252, 0.8);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: default;
        }
        
        .nav-logo {
            width: 38px; height: 38px;
            border-radius: var(--radius-sm);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--shadow-glow);
        }
        
        .nav-title {
            font-size: 19px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .nav-actions { display: flex; align-items: center; gap: 12px; }

        .theme-toggle {
            width: 42px; height: 42px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all var(--transition-fast);
        }
        
        .theme-toggle:hover {
            background: var(--glass-hover);
            color: var(--text-primary);
            border-color: var(--accent-primary);
            transform: rotate(15deg);
        }

        /* ==================== 主内容区 ==================== */
        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 48px 28px 80px;
        }

        /* Hero 区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 56px;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: var(--radius-xl);
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--accent-primary);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            animation: fadeSlideDown 0.6s ease both;
        }
        
        .badge-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.8); }
        }

        .hero-title {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 18px;
            letter-spacing: -0.03em;
            animation: fadeSlideDown 0.6s ease 0.1s both;
        }
        
        .hero-title .highlight {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero-desc {
            font-size: 17px;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 32px;
            animation: fadeSlideDown 0.6s ease 0.2s both;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
            animation: fadeSlideDown 0.6s ease 0.3s both;
        }
        
        .stat-item { text-align: center; }
        .stat-num {
            font-size: 30px;
            font-weight: 800;
            color: var(--text-primary);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ==================== 工具栏（搜索+筛选）==================== */
        .toolbar-section {
            margin-bottom: 36px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .search-bar-wrapper {
            position: relative;
            max-width: 520px;
        }
        
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 17px;
            pointer-events: none;
            transition: color var(--transition-fast);
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all var(--transition-normal);
        }
        
        .search-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: var(--glass-hover);
        }
        
        .search-input:focus + .search-icon,
        .search-input:focus ~ .search-icon { color: var(--accent-primary); }
        
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 50%;
            display: none;
            transition: all var(--transition-fast);
        }
        
        .search-clear:hover { color: var(--text-primary); background: var(--glass-hover); }
        .search-input:not(:placeholder-shown) + .search-icon + .search-clear { display: block; }

        /* 分类筛选标签 */
        .filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        
        .filter-tabs::-webkit-scrollbar { display: none; }
        
        .filter-tab {
            padding: 9px 20px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
        }
        
        .filter-tab:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.06);
        }
        
        .filter-tab.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .filter-count {
            font-size: 11px;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ==================== 工具卡片网格 ==================== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 20px;
        }

        .tool-card {
            position: relative;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 26px 24px;
            cursor: pointer;
            transition: all var(--transition-normal);
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
            animation: cardReveal 0.5s ease forwards;
        }
        
        @keyframes cardReveal {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tool-card:hover {
            border-color: rgba(99, 102, 241, 0.35);
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            background: var(--glass-hover);
        }

        .card-glow-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2.5px;
            background: var(--card-accent, var(--accent-gradient));
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        
        .tool-card:hover .card-glow-line { opacity: 1; }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .card-icon-wrap {
            flex-shrink: 0;
            width: 50px; height: 50px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 23px;
            background: var(--icon-bg, linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1)));
            transition: transform var(--transition-spring);
        }
        
        .tool-card:hover .card-icon-wrap { transform: scale(1.08) rotate(-3deg); }

        .card-info { flex: 1; min-width: 0; }
        
        .card-name {
            font-size: 16.5px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        
        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: var(--radius-xl);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        
        .tag-hot {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .tag-new {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .tag-pro {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .card-desc {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-models {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .model-chip {
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.08);
            color: var(--accent-primary);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }
        
        .card-action-btn {
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--accent-gradient);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .card-action-btn:hover {
            box-shadow: 0 4px 16px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 72px 24px;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 54px;
            margin-bottom: 18px;
            opacity: 0.45;
        }
        
        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* ==================== 详情弹窗 ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }
        
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-dialog {
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-lg);
            transform: scale(0.92) translateY(20px);
            transition: transform var(--transition-spring);
        }
        
        .modal-overlay.show .modal-dialog {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 28px 28px 0;
        }
        
        .modal-icon {
            width: 58px; height: 58px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .modal-title-group { flex: 1; }
        
        .modal-name {
            font-size: 23px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        
        .modal-category {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .modal-close {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        
        .modal-close:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .modal-body { padding: 24px 28px; }
        
        .modal-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .modal-features {
            margin-bottom: 24px;
        }
        
        .modal-features h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        
        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .feature-check {
            color: var(--success);
            font-size: 15px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .modal-models {
            margin-bottom: 28px;
        }
        
        .modal-models h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        
        .model-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .model-badge {
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
            font-size: 12.5px;
            font-weight: 600;
        }

        .modal-footer {
            padding: 0 28px 28px;
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .modal-btn.primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        
        .modal-btn.secondary {
            background: var(--glass-bg);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }
        
        .modal-btn.secondary:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* ==================== 页脚 ==================== */
        .page-footer {
            text-align: center;
            padding: 40px 28px 32px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--glass-border);
            margin-top: 48px;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            .navbar { padding: 0 18px; height: 60px; }
            .nav-title { font-size: 16px; }
            .main-container { padding: 32px 16px 60px; }
            .tools-grid { grid-template-columns: 1fr; gap: 14px; }
            .tool-card { padding: 20px 18px; }
            .stats-row { gap: 28px; }
            .stat-num { font-size: 24px; }
            .modal-dialog { max-height: 90vh; }
            .modal-header { padding: 22px 20px 0; }
            .modal-body { padding: 20px; }
            .modal-footer { padding: 0 20px 22px; flex-direction: column; }
        }

        @media (max-width: 480px) {
            .filter-tabs { gap: 6px; }
            .filter-tab { padding: 7px 14px; font-size: 12.5px; }
            .hero-title { font-size: 26px; }
        }

        /* ==================== 动画延迟工具类 ==================== */
        .stagger-1 { animation-delay: 0.05s !important; }
        .stagger-2 { animation-delay: 0.1s !important; }
        .stagger-3 { animation-delay: 0.15s !important; }
        .stagger-4 { animation-delay: 0.2s !important; }
        .stagger-5 { animation-delay: 0.25s !important; }
        .stagger-6 { animation-delay: 0.3s !important; }
        .stagger-7 { animation-delay: 0.35s !important; }
        .stagger-8 { animation-delay: 0.4s !important; }
        .stagger-9 { animation-delay: 0.45s !important; }
        .stagger-10{ animation-delay: 0.5s !important; }

/** 渲染分类标签栏 */
function renderFilterTabs() {
    filterTabs.innerHTML = CATEGORIES.map(cat => {
        const count = cat.id === "all"
            ? TOOLS.length
            : TOOLS.filter(t => t.category === cat.id).length;
        return `
            <button class="filter-tab${cat.id === activeCategory ? " active" : ""}"
                    data-category="${cat.id}">
                ${cat.icon} ${cat.label}
                <span class="filter-count">${count}</span>
            </button>`;
    }).join("");

    // 绑定事件
    filterTabs.querySelectorAll(".filter-tab").forEach(tab => {
        tab.addEventListener("click", () => {
            activeCategory = tab.dataset.category;
            renderFilterTabs();
            renderToolsGrid();
        });
    });
}

/** 渲染工具卡片网格 */
function renderToolsGrid() {
    let filtered = TOOLS;

    if (activeCategory !== "all") {
        filtered = filtered.filter(t => t.category === activeCategory);
    }
    if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.desc.toLowerCase().includes(q)
        );
    }

    if (filtered.length === 0) {
        toolsGrid.innerHTML = `
            <div class="empty-state stagger-1">
                <div class="empty-state-icon">&#128269;</div>
                <p class="empty-state-text">没有找到匹配的工具，换个关键词试试？</p>

    toolsGrid.innerHTML = filtered.map((tool, i) => {
        const tagHtml = tool.tag
            ? `<span class="card-tag tag-${tool.tag}">${tool.tagText}</span>`
            : "";
        const modelChips = tool.models.slice(0, 3).map(m =>
            `<span class="model-chip">${m}</span>`).join("");
        const staggerClass = `stagger-${Math.min(i % 16 + 1, 16)}`;

        return `
            <article class="tool-card ${staggerClass}" data-id="${tool.id}"
                     style="--card-accent:${tool.accent};--icon-bg:${tool.iconBg}">
                <div class="card-glow-line"></div>
                <div class="card-header">
                    <div class="card-icon-wrap">${tool.icon}</div>
                    <div class="card-info">
                        <h3 class="card-name">${tool.name}</h3>
                        ${tagHtml}
                    </div>
                </div>
                <p class="card-desc">${tool.desc}</p>
                <div class="card-footer">
                    <div class="card-models">${modelChips}</div>
                    <button class="card-action-btn" onclick="openModal(${tool.id})">立即使用 &#8594;</button>
                </div>
            </article>`;
    }).join("");
}


/* ================================================================
 * 弹窗逻辑
 * ================================================================ */

function openModal(toolId) {
    const tool = TOOLS.find(t => t.id === toolId);
    if (!tool) return;

    const tagHtml = tool.tag
        ? `<span class="card-tag tag-${tool.tag}">${tool.tagText}</span>`
        : "";

    modalDialog.innerHTML = `
        <header class="modal-header">
            <div class="modal-icon" style="background:${tool.iconBg}">${tool.icon}</div>
            <div class="modal-title-group">
                <h2 class="modal-name">${tool.name} ${tagHtml}</h2>
                <p class="modal-category">${CATEGORIES.find(c => c.id === tool.category)?.label || ""}</p>
            </div>
            <button class="modal-close" onclick="closeModal()" aria-label="关闭">&#10005;</button>
        </header>
        <div class="modal-body">
            <p class="modal-desc">${tool.detailDesc}</p>
            
            <div class="modal-features">
                <h4>&#10024; 功能特性</h4>
                <ul class="feature-list">
                    ${tool.features.map(f => `
                        <li class="feature-item">
                            <span class="feature-check">&#10003;</span>${f}
                        </li>`).join("")}
                </ul>
            </div>
            
            <div class="modal-models">
                <h4>&#128187; 支持的大模型</h4>
                <div class="model-list">
                    ${tool.models.map(m => `<span class="model-badge">${m}</span>`).join("")}
                </div>
            </div>
        </div>
        <footer class="modal-footer">
            <button class="modal-btn primary" onclick="closeModal()">
                &#128640; 开始使用
            </button>
            <button class="modal-btn secondary" onclick="closeModal()">
                &#128203; 复制说明
            </button>
        </footer>`;

    modalOverlay.classList.add("show");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    modalOverlay.classList.remove("show");
    document.body.style.overflow = "";
}

// 点击遮罩关闭
modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) closeModal();
});

// ESC 关闭
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
});


/* ================================================================
 * 搜索逻辑
 * ================================================================ */

searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value;
    renderToolsGrid();
});

searchClear.addEventListener("click", () => {
    searchInput.value = "";
    searchQuery = "";
    renderToolsGrid();
});


/* ================================================================
 * 主题切换
 * ================================================================ */

let isDark = true;

themeToggle.addEventListener("click", () => {
    isDark = !isDark;
    document.body.dataset.theme = isDark ? "dark" : "light";
    themeToggle.innerHTML = isDark ? "&#127769;" : "&#9788;";
});


/* ================================================================
 * 初始化
 * ================================================================ */

renderFilterTabs();
renderToolsGrid();

</script>
</body>
</html>
