<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 创作工具箱 - 智能创作平台</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px var(--accent-glow);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 30px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-hover: rgba(99, 102, 241, 0.05);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 25px rgba(99, 102, 241, 0.2);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.6; overflow-x: hidden; transition: background var(--transition-normal), color var(--transition-normal); }
        .bg-decoration { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: blobFloat 20s ease-in-out infinite alternate; }
        .bg-blob:nth-child(1) { width: 600px; height: 600px; background: var(--accent-primary); top: -15%; left: -10%; animation-delay: 0s; }
        .bg-blob:nth-child(2) { width: 500px; height: 500px; background: var(--accent-secondary); top: 50%; right: -10%; animation-delay: -5s; }
        .bg-blob:nth-child(3) { width: 400px; height: 400px; background: #a78bfa; bottom: -10%; left: 30%; animation-delay: -10s; }
        .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; }
        @keyframes blobFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, -30px) scale(1.1); } }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; background: rgba(10, 14, 26, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); }
        .nav-logo { font-size: 28px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-title { font-size: 18px; font-weight: 600; }
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        .theme-toggle { width: 40px; height: 40px; border: none; background: var(--glass-bg); border-radius: 12px; cursor: pointer; font-size: 18px; transition: all var(--transition-fast); border: 1px solid var(--glass-border); }
        .theme-toggle:hover { background: var(--glass-hover); transform: scale(1.1); }
        .main-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .hero-section { text-align: center; padding: 140px 0 60px; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 100px; font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; animation: fadeInUp 0.6s ease; }
        .badge-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .hero-title { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1.1; margin-bottom: 20px; animation: fadeInUp 0.6s ease 0.1s both; }
        .hero-title .highlight { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-desc { font-size: 18px; color: var(--text-secondary); max-width: 600px; margin: 0 auto 40px; animation: fadeInUp 0.6s ease 0.2s both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stats-row { display: flex; justify-content: center; gap: 48px; animation: fadeInUp 0.6s ease 0.3s both; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 32px; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
        .toolbar-section { padding: 40px 0; }
        .search-bar-wrapper { position: relative; max-width: 600px; margin: 0 auto 24px; }
        .search-input { width: 100%; padding: 16px 50px 16px 52px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 16px; font-size: 16px; color: var(--text-primary); outline: none; transition: all var(--transition-fast); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent-primary); box-shadow: var(--shadow-glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px; }
        .search-clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px; display: none; }
        .search-clear.show { display: block; }
        .filter-tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .filter-tab { padding: 10px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 100px; color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; gap: 6px; }
        .filter-tab:hover { background: var(--glass-hover); color: var(--text-primary); }
        .filter-tab.active { background: var(--accent-gradient); color: white; border-color: transparent; }
        .filter-count { font-size: 12px; padding: 2px 8px; background: rgba(255,255,255,0.2); border-radius: 100px; }
        .filter-tab:not(.active) .filter-count { background: var(--glass-border); }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding: 20px 0 80px; }
        .tool-card { position: relative; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 24px; transition: all var(--transition-normal); cursor: pointer; overflow: hidden; }
        .tool-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-accent, var(--accent-gradient)); opacity: 0; transition: opacity var(--transition-fast); }
        .tool-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); box-shadow: var(--shadow-glow); }
        .tool-card:hover::before { opacity: 1; }
        .card-glow-line { position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-primary), transparent); opacity: 0; transition: opacity var(--transition-fast); }
        .tool-card:hover .card-glow-line { opacity: 0.5; }
        .card-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
        .card-icon-wrap { width: 48px; height: 48px; background: var(--icon-bg, var(--glass-bg)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .card-info { flex: 1; min-width: 0; }
        .card-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .card-tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
        .tag-hot { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .tag-new { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .tag-pro { background: rgba(99, 102, 241, 0.15); color: #6366f1; }
        .tag-recommend { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .card-models { display: flex; gap: 6px; flex-wrap: wrap; }
        .model-chip { font-size: 11px; padding: 4px 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 100px; color: var(--text-muted); }
        .card-action-btn { padding: 8px 16px; background: var(--accent-gradient); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition-fast); white-space: nowrap; }
        .card-action-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-glow); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-text { color: var(--text-muted); font-size: 16px; }
        .page-footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--glass-border); color: var(--text-muted); font-size: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-dialog { background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 20px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { display: flex; align-items: center; gap: 16px; padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .modal-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
        .modal-title-group { flex: 1; }
        .modal-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .modal-category { font-size: 14px; color: var(--text-muted); }
        .modal-close { width: 36px; height: 36px; background: var(--glass-bg); border: none; border-radius: 10px; color: var(--text-secondary); font-size: 18px; cursor: pointer; transition: all var(--transition-fast); }
        .modal-close:hover { background: var(--glass-hover); color: var(--text-primary); }
        .modal-body { padding: 24px; }
        .modal-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px; }
        .modal-features { margin-bottom: 20px; }
        .modal-features h4 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .feature-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .feature-item { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-secondary); }
        .feature-check { color: var(--success); font-weight: 600; flex-shrink: 0; }
        .modal-models h4 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .model-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .model-badge { font-size: 13px; padding: 6px 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-secondary); }
        .modal-footer { display: flex; gap: 12px; padding: 20px 24px; border-top: 1px solid var(--glass-border); }
        .modal-btn { flex: 1; padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all var(--transition-fast); }
        .modal-btn.primary { background: var(--accent-gradient); border: none; color: white; }
        .modal-btn.primary:hover { transform: scale(1.02); box-shadow: var(--shadow-glow); }
        .modal-btn.secondary { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); }
        .modal-btn.secondary:hover { background: var(--glass-hover); }
        .stagger-1 { animation: fadeInUp 0.5s ease 0.05s both; }
        .stagger-2 { animation: fadeInUp 0.5s ease 0.1s both; }
        .stagger-3 { animation: fadeInUp 0.5s ease 0.15s both; }
        .stagger-4 { animation: fadeInUp 0.5s ease 0.2s both; }
        .stagger-5 { animation: fadeInUp 0.5s ease 0.25s both; }
        .stagger-6 { animation: fadeInUp 0.5s ease 0.3s both; }
        .stagger-7 { animation: fadeInUp 0.5s ease 0.35s both; }
        .stagger-8 { animation: fadeInUp 0.5s ease 0.4s both; }
        .stagger-9 { animation: fadeInUp 0.5s ease 0.45s both; }
        .stagger-10 { animation: fadeInUp 0.5s ease 0.5s both; }
        .stagger-11 { animation: fadeInUp 0.5s ease 0.55s both; }
        .stagger-12 { animation: fadeInUp 0.5s ease 0.6s both; }
        .stagger-13 { animation: fadeInUp 0.5s ease 0.65s both; }
        .stagger-14 { animation: fadeInUp 0.5s ease 0.7s both; }
        .stagger-15 { animation: fadeInUp 0.5s ease 0.75s both; }
        .stagger-16 { animation: fadeInUp 0.5s ease 0.8s both; }
        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; }
            .hero-section { padding: 120px 0 40px; }
            .hero-title { font-size: 32px; }
            .stats-row { gap: 24px; }
            .stat-num { font-size: 24px; }
            .tools-grid { grid-template-columns: 1fr; gap: 16px; }
            .filter-tabs { gap: 8px; }
            .filter-tab { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="bg-decoration">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
        <div class="bg-grid"></div>
    </div>
    <nav class="navbar">
        <a class="nav-brand" href="#">
            <div class="nav-logo">&#10022;</div>
            <span class="nav-title">AI 创作工具箱</span>
        </a>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" title="切换主题">&#127769;</button>
        </div>
    </nav>
    <main class="main-container">
        <section class="hero-section">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span>16+ AI 创作工具 &#183; 全场景覆盖</span>
            </div>
            <h1 class="hero-title">智能创作<br><span class="highlight">一站式工具箱</span></h1>
            <p class="hero-desc">从灵感到成品，覆盖小说、短剧、公众号、视频等全场景创作的 16+ AI 工具，对接全球顶尖大模型</p>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-num">16+</div><div class="stat-label">创作工具</div></div>
                <div class="stat-item"><div class="stat-num">9</div><div class="stat-label">大模型</div></div>
                <div class="stat-item"><div class="stat-num">6</div><div class="stat-label">功能分类</div></div>
            </div>
        </section>
        <section class="toolbar-section">
            <div class="search-bar-wrapper">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索工具名称或功能描述...">
                <button class="search-clear" id="searchClear" aria-label="清除搜索">&#10005;</button>
            </div>
            <div class="filter-tabs" id="filterTabs"></div>
        </section>
        <section class="tools-grid" id="toolsGrid"></section>
    </main>
    <footer class="page-footer">
        <p>AI 创作工具箱 &#8212; 让创作更高效 &#183; 更智能 &#183; 更自由</p>
    </footer>
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
        <div class="modal-dialog" id="modalDialog"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
